version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: quintadalam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quinta_dalam_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Alinear con backend application-dev.yml; sobreescribe en `.env`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d quinta_dalam_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: quintadalam-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quintadalam.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
