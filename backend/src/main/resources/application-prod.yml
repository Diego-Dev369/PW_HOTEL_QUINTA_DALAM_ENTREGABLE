spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: hotel
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    default-schema: hotel
    schemas: hotel
    locations: classpath:db/migration

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  mail:
    from: ${MAIL_FROM}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
    jwt-refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}
    require-strong-jwt-secret: ${JWT_REQUIRE_STRONG_SECRET:true}
  stripe:
    secret-key: ${PAYMENT_STRIPE_SECRET_KEY}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET}
  rate-limit:
    login-requests-per-ip-per-minute: ${QD_LOGIN_RL:30}
  outbox:
    worker:
      enabled: ${OUTBOX_WORKER_ENABLED:true}
      fixed-delay-ms: ${OUTBOX_WORKER_FIXED_DELAY_MS:10000}
      batch-size: ${OUTBOX_WORKER_BATCH_SIZE:50}
      max-attempts: ${OUTBOX_WORKER_MAX_ATTEMPTS:8}

logging:
  pattern:
    console: "{\"time\":\"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}\",\"level\":\"%p\",\"thread\":\"%t\",\"logger\":\"%c\",\"msg\":\"%replace(%replace(%msg%){'\n','\n'}){'\"','\\\\\"'}\"}%n"
