# Perfil por defecto: dev (uso local). En producción: SPRING_PROFILES_ACTIVE=prod
spring:
  application:
    name: quintadalam-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  mail:
    from: ${MAIL_FROM:no-reply@quintadalam.mx}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  outbox:
    worker:
      enabled: ${OUTBOX_WORKER_ENABLED:true}
      fixed-delay-ms: ${OUTBOX_WORKER_FIXED_DELAY_MS:15000}
      batch-size: ${OUTBOX_WORKER_BATCH_SIZE:20}
      max-attempts: ${OUTBOX_WORKER_MAX_ATTEMPTS:6}
