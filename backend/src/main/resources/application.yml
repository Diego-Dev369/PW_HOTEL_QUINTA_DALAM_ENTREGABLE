spring:
  application:
    name: quintadalam-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quintadalam}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: hotel
        jdbc:
          time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    default-schema: hotel
    schemas: hotel
    locations: classpath:db/migration

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  ssl:
    enabled: ${APP_SSL_ENABLED:false}
    key-store: ${APP_SSL_KEYSTORE:}
    key-store-password: ${APP_SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${APP_SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${APP_SSL_KEY_ALIAS:tomcat}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-key-with-at-least-32-characters}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    jwt-refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}
  stripe:
    secret-key: ${PAYMENT_STRIPE_SECRET_KEY:}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
